<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nguix</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">
        <h1>Ng<span>ui</span>x</h1>
        <small>nginx manager</small>
        <span class="sidebar-version">v1.0.1</span>
      </div>
      <nav>
        <a href="#" class="active">
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Virtual Hosts
        </a>
      </nav>
      <button
        class="icon-btn theme-toggle"
        id="theme-toggle"
        title="Toggle theme"
        onclick="toggleTheme()"
      >
        <svg
          id="theme-icon-sun"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          style="display: none"
        >
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg
          id="theme-icon-moon"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h2>Virtual Hosts</h2>
          <p>Manage your nginx server blocks</p>
        </div>
        <button class="btn btn-primary" onclick="alert('Coming soon')">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add virtual host
        </button>
      </div>

      <div id="container" class="loader">
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Total</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Enabled</div>
            <div class="stat-value green" id="stat-enabled">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">SSL secured</div>
            <div class="stat-value yellow" id="stat-ssl">0</div>
          </div>
        </div>

        <div class="filters">
          <div class="search-wrap">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="search"
              placeholder="Search domains…"
              oninput="render()"
            />
          </div>
          <div class="filter-tabs">
            <div
              class="filter-tab active"
              data-filter="all"
              onclick="setFilter(this)"
            >
              All
            </div>
            <div
              class="filter-tab"
              data-filter="enabled"
              onclick="setFilter(this)"
            >
              Enabled
            </div>
            <div
              class="filter-tab"
              data-filter="disabled"
              onclick="setFilter(this)"
            >
              Disabled
            </div>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Domain</th>
                <th>Port</th>
                <th>SSL</th>
                <th>Status</th>
                <th>Config file</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="vhost-list"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
